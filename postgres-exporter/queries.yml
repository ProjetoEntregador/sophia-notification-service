pg_stat_statements_io_time:
  query: |
    SELECT
      db.datname,
      md5(s.query) AS query_id,
      LEFT(regexp_replace(s.query, E'\\s+', ' ', 'g'), 120) AS query_preview,
      s.calls::float AS calls,
      s.blk_read_time::float AS blk_read_time,
      s.blk_write_time::float AS blk_write_time,
      (s.blk_read_time + s.blk_write_time)::float AS total_io_time
    FROM pg_stat_statements s
    JOIN pg_database db
      ON db.oid = s.dbid
    WHERE db.datname NOT IN ('template0', 'template1')
      AND upper(ltrim(s.query)) ~ '^(SELECT|INSERT|UPDATE|DELETE)(\s|$)'
      AND s.query ~* '\m(chat_messages|medications|reminders|treatments|users)\M'
      AND s.query NOT ILIKE '%pg_sleep%'
      AND s.query NOT ILIKE '%pg_database_size%'
      AND s.query NOT ILIKE '%pg_stat_%'
      AND s.query NOT ILIKE '%pg_catalog%'
      AND s.query NOT ILIKE '%information_schema%'
    ORDER BY (s.blk_read_time + s.blk_write_time) DESC
    LIMIT 20;
  metrics:
    - datname:
        usage: 'LABEL'
        description: 'Database name'
    - query_id:
        usage: 'LABEL'
        description: 'Query hash'
    - query_preview:
        usage: 'LABEL'
        description: 'Query preview'
    - calls:
        usage: 'GAUGE'
        description: 'Number of times query was executed'
    - blk_read_time:
        usage: 'GAUGE'
        description: 'Time spent reading blocks in milliseconds'
    - blk_write_time:
        usage: 'GAUGE'
        description: 'Time spent writing blocks in milliseconds'
    - total_io_time:
        usage: 'GAUGE'
        description: 'Total I/O time in milliseconds'
