services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - 6380:6379
    networks:
      - net1

  sophia-postgres:
    image: postgres:16-bullseye
    ports:
      - 5433:5432
    container_name: sophia-postgres
    volumes:
      - data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./logs:/var/log/postgresql
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    command:
      - 'postgres'
      - '-c'
      - 'shared_preload_libraries=pg_stat_statements'
      - '-c'
      - 'pg_stat_statements.track=all'
      - '-c'
      - 'track_io_timing=on'
      - '-c'
      - 'logging_collector=on'
      - '-c'
      - 'log_directory=/var/log/postgresql'
      - '-c'
      - 'log_filename=postgresql-%Y-%m-%d.log'
      - '-c'
      - 'log_line_prefix=%m [%p] user=%u db=%d app=%a client=%h '
      - '-c'
      - 'log_statement=mod'
      - '-c'
      - 'log_min_duration_statement=1000'
      - '-c'
      - 'log_connections=on'
      - '-c'
      - 'log_disconnections=on'
      - '-c'
      - 'log_lock_waits=on'
      - '-c'
      - 'deadlock_timeout=5s'
    networks:
      - net1

  sophia-notification-service:
    build:
      context: .
      dockerfile: ./compose/nest/Dockerfile
    container_name: sophia-notification-service
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
    ports:
      - '3001:3000'
    depends_on:
      - sophia-postgres
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - auth_info_baileys:/app/auth_info_baileys
    networks:
      - net1

  notification-postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: notification-postgres-exporter
    depends_on:
      - sophia-postgres
    environment:
      DATA_SOURCE_NAME: 'postgresql://${DB_USER}:${DB_PASSWORD}@sophia-postgres:5432/${DB_NAME}?sslmode=disable'
      PG_EXPORTER_EXTEND_QUERY_PATH: '/etc/postgres_exporter/queries.yml'
    volumes:
      - ./postgres-exporter/queries.yml:/etc/postgres_exporter/queries.yml
    command:
      - '--no-collector.stat_replication'
    networks:
      - net1

  notification-backup-service:
    image: postgres:16
    container_name: notification-backup-service
    depends_on:
      - sophia-postgres
    environment:
      POSTGRES_HOST: sophia-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      BACKUP_RETENTION_DAYS: 7
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh
      - ./scripts/restore.sh:/scripts/restore.sh
    entrypoint: >
      bash -c "
      chmod +x /scripts/backup.sh &&
      chmod +x /scripts/restore.sh &&
      while true; do
        /scripts/backup.sh;
        sleep 86400;
      done
      "
    networks:
      - net1

  notification-maintenance-service:
    image: postgres:16
    container_name: notification-maintenance-service
    depends_on:
      - sophia-postgres
    environment:
      POSTGRES_HOST: sophia-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      LOG_RETENTION_DAYS: 7
    volumes:
      - ./scripts/maintenance.sh:/scripts/maintenance.sh
      - ./logs:/postgres-logs
    entrypoint: >
      bash -c "
      chmod +x /scripts/maintenance.sh &&
      while true; do
        /scripts/maintenance.sh;
        sleep 604800;
      done
      "
    networks:
      - net1

  notification-promtail:
    image: grafana/promtail:2.9.8
    container_name: notification-promtail
    volumes:
      - ./logs:/var/log/postgresql:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - net1

networks:
  net1:
    external: true
    name: net1

volumes:
  data: {}
  auth_info_baileys: {}
